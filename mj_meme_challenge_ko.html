<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ 밈 챌린지</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
.app { max-width: 480px; width: 100%; }
h1 { font-size: 26px; font-weight: 600; text-align: center; margin-bottom: 6px; }
.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 1.5rem; }
.meme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.meme-card {
  background: white; border: 2px solid #e0e0e0; border-radius: 16px;
  padding: 1.2rem; cursor: pointer; text-align: center; transition: all 0.15s;
}
.meme-card:hover { border-color: #9b8fdd; }
.meme-card.active { border-color: #7F77DD; background: #f0effe; }
.meme-card .emoji { font-size: 36px; display: block; margin-bottom: 6px; }
.meme-card .title { font-size: 20px; font-weight: 600; }
.meme-card .desc { font-size: 11px; color: #888; margin-top: 4px; }
.listen-btn {
  display: inline-flex; align-items: center; gap: 4px; margin-top: 10px;
  padding: 5px 12px; border-radius: 20px; border: 1px solid #ddd;
  background: white; cursor: pointer; font-size: 12px; color: #555;
}
.listen-btn:hover { background: #f5f5f5; }
.listen-btn:active { transform: scale(0.97); }
.recorder {
  background: white; border-radius: 16px; padding: 1.5rem;
  text-align: center; margin-bottom: 1.5rem; border: 1px solid #e8e8e8;
}
.rec-label { font-size: 14px; color: #555; margin-bottom: 1rem; font-weight: 500; }
.waveform {
  height: 48px; display: flex; align-items: center;
  justify-content: center; gap: 3px; margin-bottom: 1.2rem;
}
.bar { width: 4px; background: #c5bff0; border-radius: 2px; transition: height 0.08s; min-height: 4px; }
.rec-btn {
  width: 72px; height: 72px; border-radius: 50%;
  border: 3px solid #7F77DD; background: #f0effe;
  cursor: pointer; font-size: 26px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px; transition: all 0.15s;
}
.rec-btn:hover { background: #e5e0fc; }
.rec-btn.recording { background: #fff0f0; border-color: #E24B4A; animation: pulse 1s infinite; }
.rec-btn:active { transform: scale(0.95); }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
.rec-tip { font-size: 12px; color: #aaa; }
.result-box {
  background: white; border: 2px solid #e0e0e0; border-radius: 16px;
  padding: 1.5rem; text-align: center; display: none;
}
.result-box.show { display: block; }
.score-ring { position: relative; width: 120px; height: 120px; margin: 0 auto 1rem; }
.score-ring svg { transform: rotate(-90deg); }
.score-text {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.score-num { font-size: 30px; font-weight: 700; color: #333; }
.score-pct { font-size: 13px; color: #888; }
.grade { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.grade-msg { font-size: 13px; color: #666; }
.retry-btn {
  margin-top: 1.2rem; padding: 9px 28px; border-radius: 24px;
  border: 1px solid #ddd; background: white; cursor: pointer;
  font-size: 14px; color: #333;
}
.retry-btn:hover { background: #f5f5f5; }
</style>
</head>

<div class="app">
  <h1>🎤 MJ 밈 챌린지</h1>
  <p class="subtitle">마이클 잭슨 명대사를 얼마나 똑같이 따라할 수 있을까?</p>

  <div class="meme-grid">

      <div class="title">"히히"</div>
      <div class="desc">그 유명한 웃음소리</div>
      <button class="listen-btn" onclick="playRef(event,'heehee')">▶ 원본 듣기</button>
    </div>
    <div class="meme-card" id="card-dow" onclick="selectMeme('dow')">
      <span class="emoji">💥</span>
      <div class="title">"아오!"</div>
      <div class="desc">전설의 추임새</div>
      <button class="listen-btn" onclick="playRef(event,'dow')">▶ 원본 듣기</button>
    </div>
  </div>

  <div class="recorder">
    <div class="rec-label" id="rec-label">"히히" 를 따라해 보세요!</div>
    <div class="waveform" id="waveform">
      <div class="bar" style="height:8px"></div><div class="bar" style="height:16px"></div>
      <div class="bar" style="height:24px"></div><div class="bar" style="height:12px"></div>
      <div class="bar" style="height:20px"></div><div class="bar" style="height:8px"></div>
      <div class="bar" style="height:16px"></div><div class="bar" style="height:24px"></div>
      <div class="bar" style="height:12px"></div><div class="bar" style="height:20px"></div>
      <div class="bar" style="height:8px"></div><div class="bar" style="height:16px"></div>
    </div>
    <button class="rec-btn" id="rec-btn" onclick="toggleRecord()">🎙️</button>
    <div class="rec-tip" id="rec-tip">버튼을 눌러 녹음 시작</div>
  </div>

  <div class="result-box" id="result-box">
    <div class="score-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#ece9fb" stroke-width="10"/>
        <circle cx="60" cy="60" r="52" fill="none" stroke="#7F77DD" stroke-width="10"
          stroke-linecap="round" id="score-arc"
          stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="score-text">
        <span class="score-num" id="score-num">0</span>
        <span class="score-pct">%</span>
      </div>
    </div>
    <div class="grade" id="grade-txt"></div>
    <div class="grade-msg" id="grade-msg"></div>
    <button class="retry-btn" onclick="retry()">↩ 다시 도전</button>
  </div>
</div>

let selectedMeme = 'heehee';
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let animFrame = null;
let analyserNode = null;
let audioCtx = null;
let currentStream = null;

function b64ToArrayBuffer(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

function selectMeme(key) {
  selectedMeme = key;
  document.querySelectorAll('.meme-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + key).classList.add('active');
  const labels = { heehee: '"히히"', dow: '"아오!"' };
  document.getElementById('rec-label').textContent = labels[key] + ' 를 따라해 보세요!';
  retry();
}

function playRef(e, key) {
  e.stopPropagation();
  try {
    const buf = b64ToArrayBuffer(AUDIO_B64[key]);
    const blob = new Blob([buf], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.play().catch(err => alert('재생 오류: ' + err.message));
  } catch(err) {
    alert('오디오 재생 실패: ' + err.message);
  }
}

async function toggleRecord() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    currentStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(currentStream);
    analyserNode = audioCtx.createAnalyser();
    analyserNode.fftSize = 256;
    source.connect(analyserNode);

    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
    mediaRecorder = new MediaRecorder(currentStream, mimeType ? { mimeType } : {});
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = processRecording;
    mediaRecorder.start(100);
    isRecording = true;

    const btn = document.getElementById('rec-btn');
    btn.classList.add('recording');
    btn.textContent = '⏹️';
    document.getElementById('rec-tip').textContent = '🔴 녹음 중... 버튼을 눌러 중지';
    document.getElementById('rec-label').textContent = '🔴 말하세요!';
    animateWaveform();
  } catch(err) {
    alert('마이크 오류: ' + err.message + '\n브라우저에서 마이크 권한을 허용해 주세요.');
  }
}

function stopRecording() {
  isRecording = false;
  cancelAnimationFrame(animFrame);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
  const btn = document.getElementById('rec-btn');
  btn.classList.remove('recording');
  btn.textContent = '⏳';
  btn.disabled = true;
  document.getElementById('rec-tip').textContent = '분석 중...';
  resetBars();
}

function animateWaveform() {
  if (!analyserNode || !isRecording) return;
  const data = new Uint8Array(analyserNode.frequencyBinCount);
  analyserNode.getByteFrequencyData(data);
  const bars = document.querySelectorAll('.bar');
  const step = Math.floor(data.length / bars.length);
  bars.forEach((b, i) => {
    const val = data[i * step] || 0;
    b.style.height = Math.max(4, Math.round(val / 4)) + 'px';
    b.style.background = '#E24B4A';
  });
  animFrame = requestAnimationFrame(animateWaveform);
}

function resetBars() {
  const heights = [8,16,24,12,20,8,16,24,12,20,8,16];
  document.querySelectorAll('.bar').forEach((b, i) => {
    b.style.height = heights[i] + 'px';
    b.style.background = '#c5bff0';
  });
}

async function processRecording() {
  if (audioChunks.length === 0) {
    showResult(Math.floor(20 + Math.random() * 30));
    return;
  }
  const blob = new Blob(audioChunks, { type: audioChunks[0].type || 'audio/webm' });
  try {
    const arrayBuf = await blob.arrayBuffer();
    const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
    const userBuf = await ctx2.decodeAudioData(arrayBuf);
    const score = computeScore(userBuf);
    showResult(score);
  } catch(e) {
    console.error(e);
    showResult(Math.floor(30 + Math.random() * 40));
  }
}

function computeScore(buf) {
  const raw = buf.getChannelData(0);
  const sr = buf.sampleRate;
  if (raw.length < 512) return 5;

  // 1. RMS 에너지
  let rms = 0;
  for (let i = 0; i < raw.length; i++) rms += raw[i] * raw[i];
  rms = Math.sqrt(rms / raw.length);
  if (rms < 0.01) return Math.floor(5 + Math.random() * 10);

  // 2. 음절 개수 추정 (에너지 피크 카운트)
  const frameSize = Math.floor(sr * 0.05);
  const frames = [];
  for (let i = 0; i + frameSize < raw.length; i += frameSize) {
    let e = 0;
    for (let j = i; j < i + frameSize; j++) e += raw[j] * raw[j];
    frames.push(Math.sqrt(e / frameSize));
  }
  const maxE = Math.max(...frames);
  const threshold = maxE * 0.3;
  let peaks = 0, inPeak = false;
  for (const e of frames) {
    if (!inPeak && e > threshold) { peaks++; inPeak = true; }
    else if (inPeak && e < threshold * 0.5) inPeak = false;
  }

  // 3. ZCR
  let zcr = 0;
  for (let i = 1; i < raw.length; i++) {
    if (Math.sign(raw[i]) !== Math.sign(raw[i-1])) zcr++;
  }
  zcr /= raw.length;

  // 4. 지속시간
  const duration = raw.length / sr;

  let score = 0;
  if (selectedMeme === 'heehee') {
    // "히히": 2음절, 0.5~1.5초, ZCR 높음
    const syllableScore = peaks === 2 ? 35 : peaks === 1 ? 15 : peaks >= 3 ? 10 : 5;
    const durationScore = duration >= 0.3 && duration <= 1.8 ? 25 : duration <= 2.5 ? 12 : 3;
    const zcrScore = zcr > 0.07 ? 25 : zcr > 0.04 ? 12 : 3;
    const energyScore = rms > 0.05 && rms < 0.4 ? 15 : rms > 0.02 ? 8 : 2;
    score = syllableScore + durationScore + zcrScore + energyScore;
  } else {
    // "아오!": 1~2음절, 짧고 강하게
    const syllableScore = peaks === 1 ? 35 : peaks === 2 ? 25 : 5;
    const durationScore = duration >= 0.15 && duration <= 1.0 ? 25 : duration <= 1.5 ? 12 : 3;
    const energyScore = rms > 0.08 ? 25 : rms > 0.04 ? 12 : 3;
    const zcrScore = zcr > 0.03 && zcr < 0.12 ? 15 : 5;
    score = syllableScore + durationScore + energyScore + zcrScore;
  }

  const noise = Math.floor(Math.random() * 16) - 8;
  return Math.min(99, Math.max(5, score + noise));
}

function showResult(score) {
  const btn = document.getElementById('rec-btn');
  btn.textContent = '🎙️';
  btn.disabled = false;
  document.getElementById('rec-tip').textContent = '버튼을 눌러 다시 녹음';

  const box = document.getElementById('result-box');
  box.classList.add('show');

  const arc = document.getElementById('score-arc');
  const offset = 326.7 - (score / 100) * 326.7;
  setTimeout(() => { arc.style.transition = 'stroke-dashoffset 1s ease'; arc.style.strokeDashoffset = offset; }, 50);

  let cur = 0;
  const numEl = document.getElementById('score-num');
  const iv = setInterval(() => {
    cur = Math.min(score, cur + 2);
    numEl.textContent = cur;
    if (cur >= score) clearInterval(iv);
  }, 25);

  let grade, msg, color;
  if (score >= 90) { grade = '🏆 KING OF POP!'; msg = '완벽해요! 마이클이 인정할 거예요!'; color = '#534AB7'; }
  else if (score >= 75) { grade = '🌟 거의 완벽!'; msg = '아주 비슷해요! 조금만 더!'; color = '#0F6E56'; }
  else if (score >= 55) { grade = '👍 꽤 비슷해요!'; msg = '느낌은 살았어요, 계속 연습!'; color = '#BA7517'; }
  else if (score >= 35) { grade = '😅 노력이 보여요!'; msg = '원본 듣고 다시 도전해 보세요~'; color = '#D85A30'; }
  else { grade = '🙈 MJ가 울겠어요...'; msg = '힘내요! 다시 한 번 도전!'; color = '#E24B4A'; }

  document.getElementById('grade-txt').textContent = grade;
  document.getElementById('grade-txt').style.color = color;
  document.getElementById('grade-msg').textContent = msg;
}

function retry() {
  document.getElementById('result-box').classList.remove('show');
  const btn = document.getElementById('rec-btn');
  btn.textContent = '🎙️'; btn.disabled = false; btn.className = 'rec-btn';
  const labels = { heehee: '"히히"', dow: '"아오!"' };
  document.getElementById('rec-label').textContent = labels[selectedMeme] + ' 를 따라해 보세요!';
  document.getElementById('rec-tip').textContent = '버튼을 눌러 녹음 시작';
  resetBars();
}
</script>
